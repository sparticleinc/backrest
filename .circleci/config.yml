version: 2.1

# 参考 gbase-frontend-onprem 的 CircleCI 逻辑：
#   原生分架构构建（amd64 / arm64 分别跑在各自原生机器，无需 QEMU 模拟）
#   → 按 digest 推送（push-by-digest，不产生 -amd64/-arm64 中间标签）
#   → 合并成单一多架构标签（manifest list）
# CI（构建 + 推送镜像到 Docker Hub）+ CD（main 分支合并镜像后 SSH 部署到上海服务器）。
#
# 需要在 CircleCI 项目环境变量中配置：
#   DOCKERHUB_USERNAME / DOCKERHUB_PASS —— Docker Hub 登录凭据（对 gptbasesparticle 有推送权限）
#   ONPREM_DEPLOY_SSH_HOST / ONPREM_DEPLOY_SSH_PORT / ONPREM_DEPLOY_SSH_USER —— 上海服务器 SSH 连接信息
#   ONPREM_DEPLOY_SSH_KEY_FINGERPRINT —— CircleCI 项目设置 → SSH Keys 上传私钥后返回的 MD5 指纹

jobs:
  # 基础校验：前端类型检查 + Go 构建（所有分支）
  check:
    docker:
      - image: cimg/go:1.26-node
    resource_class: medium
    steps:
      - checkout
      - run:
          name: 前端依赖安装与类型检查
          command: |
            corepack enable
            corepack prepare pnpm@10 --activate
            cd webui
            pnpm install --frozen-lockfile
            pnpm run check
            pnpm run build
      - run:
          name: Go 构建
          command: |
            CGO_ENABLED=0 go build -tags tray ./cmd/backrest
            CGO_ENABLED=0 go build ./cmd/docker-entrypoint

  # 生成唯一入口的共享镜像标签（YYYYMMDDHHMMSS，Asia/Tokyo），持久化供各架构与合并 job 共享
  prepare:
    docker:
      - image: cimg/base:current
    resource_class: small
    working_directory: /tmp/workspace
    steps:
      - run:
          name: 生成共享镜像标签
          command: |
            IMAGE_TAG=$(TZ='Asia/Tokyo' date +%Y%m%d%H%M%S)
            mkdir -p /tmp/workspace
            echo "$IMAGE_TAG" > /tmp/workspace/IMAGE_TAG
            echo "Generated shared IMAGE_TAG: $IMAGE_TAG"
      - persist_to_workspace:
          root: /tmp/workspace
          paths:
            - IMAGE_TAG

  # 单架构：在原生架构机器上从源码构建并按 digest 推送
  docker-build-push-arch:
    machine:
      image: ubuntu-2404:current
      docker_layer_caching: true
    resource_class: << parameters.resource-class >>
    parameters:
      repo:
        type: string
      dockerfile:
        type: string
      arch:
        type: string
      resource-class:
        type: string
    working_directory: /tmp/workspace
    steps:
      - checkout
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: 登录 Docker Hub
          command: |
            echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run:
          name: 按 digest 构建并推送（不创建架构标签）
          command: |
            BACKREST_BUILD_VERSION=$(cat /tmp/workspace/IMAGE_TAG)
            # 使用 buildx 的 container 驱动，支持 push-by-digest：
            # 只把镜像内容按 digest 推到仓库，不生成任何 -amd64/-arm64 标签
            docker buildx create --use --name multiarch >/dev/null 2>&1 || docker buildx use multiarch
            docker buildx build \
              -f << parameters.dockerfile >> \
              --build-arg BACKREST_BUILD_VERSION="$BACKREST_BUILD_VERSION" \
              --output "type=image,name=<< parameters.repo >>,push-by-digest=true,push=true" \
              --metadata-file /tmp/metadata.json \
              .
            DIGEST=$(jq -r '."containerimage.digest"' /tmp/metadata.json)
            echo "本架构镜像 digest: $DIGEST"
            mkdir -p /tmp/workspace/digests
            echo "$DIGEST" > /tmp/workspace/digests/<< parameters.arch >>
      - persist_to_workspace:
          root: /tmp/workspace
          paths:
            - digests

  # 多架构清单合并：用两架构 digest 合并到统一标签（拉取时按运行架构自动选择）
  docker-manifest-merge:
    machine:
      image: ubuntu-2404:current
    resource_class: medium
    parameters:
      repo:
        type: string
      deploy:
        type: boolean
        default: false
    working_directory: /tmp/workspace
    steps:
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: 合并多架构镜像到统一时间戳标签
          command: |
            echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            BASE_TAG=$(cat /tmp/workspace/IMAGE_TAG)
            AMD_DIGEST=$(cat /tmp/workspace/digests/amd64)
            ARM_DIGEST=$(cat /tmp/workspace/digests/arm64)
            echo "export BASE_TAG=$BASE_TAG" >> $BASH_ENV
            echo "BASE_TAG=$BASE_TAG amd64=$AMD_DIGEST arm64=$ARM_DIGEST"
            docker buildx imagetools create \
              -t << parameters.repo >>:${BASE_TAG} \
              << parameters.repo >>@${AMD_DIGEST} \
              << parameters.repo >>@${ARM_DIGEST}
            docker buildx imagetools inspect << parameters.repo >>:${BASE_TAG}
      - when:
          # 仅当 deploy=true 且当前分支为 main 时才触发 CD
          condition:
            and:
              - << parameters.deploy >>
              - equal: [ main, << pipeline.git.branch >> ]
          steps:
            # 将预先在 CircleCI 项目设置 → SSH Keys 上传的私钥加载到 ssh-agent
            # ONPREM_DEPLOY_SSH_KEY_FINGERPRINT 是上传私钥后 CircleCI 返回的 MD5 指纹
            - add_ssh_keys:
                fingerprints:
                  - "$ONPREM_DEPLOY_SSH_KEY_FINGERPRINT"
            - run:
                name: SSH 部署到上海服务器（更新 backrest 镜像并重启）
                command: |
                  # 把服务器公钥写入 known_hosts，避免首次连接时的交互确认
                  mkdir -p ~/.ssh
                  ssh-keyscan -H -p "$ONPREM_DEPLOY_SSH_PORT" "$ONPREM_DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

                  # 部署使用合并后的单一标签 BASE_TAG（多架构 manifest），服务器按自身架构自动拉取
                  # - 本地 shell 展开 $BASE_TAG 组装成远端命令前缀
                  # - heredoc 使用 'REMOTE' 单引号形式，避免本地对脚本体再次展开
                  # - sed 直接替换 backrest 的整行 image 字段（兼容任意仓库前缀与任意标签格式）
                  ssh -p "$ONPREM_DEPLOY_SSH_PORT" "$ONPREM_DEPLOY_SSH_USER@$ONPREM_DEPLOY_SSH_HOST" \
                    "IMAGE_TAG='$BASE_TAG' bash -s" <<'REMOTE'
                  set -euo pipefail
                  cd gbase_onprem
                  echo "更新前 backrest 镜像行："
                  grep -E '^[[:space:]]*image:[[:space:]]*[^#[:space:]]*backrest:[0-9]' docker-compose.yml || true
                  sed -i -E "s|^([[:space:]]*)image:[[:space:]]*[^#[:space:]]*backrest:[0-9][^[:space:]]*|\1image: gptbasesparticle/backrest:${IMAGE_TAG}|" docker-compose.yml
                  echo "更新后 backrest 镜像行："
                  grep -E "^[[:space:]]*image:[[:space:]]*gptbasesparticle/backrest:${IMAGE_TAG}" docker-compose.yml
                  docker compose down backrest
                  docker compose up backrest -d
                  REMOTE

workflows:
  ci:
    jobs:
      - check
      # 仅 main 分支构建并推送镜像
      - prepare:
          filters:
            branches:
              only:
                - main
      - docker-build-push-arch:
          name: docker-build-push-amd64
          repo: gptbasesparticle/backrest
          dockerfile: Dockerfile
          arch: amd64
          resource-class: medium
          filters:
            branches:
              only:
                - main
          requires:
            - check
            - prepare
      - docker-build-push-arch:
          name: docker-build-push-arm64
          repo: gptbasesparticle/backrest
          dockerfile: Dockerfile
          arch: arm64
          resource-class: arm.medium
          filters:
            branches:
              only:
                - main
          requires:
            - check
            - prepare
      - docker-manifest-merge:
          name: docker-manifest-merge
          repo: gptbasesparticle/backrest
          deploy: true
          filters:
            branches:
              only:
                - main
          requires:
            - docker-build-push-amd64
            - docker-build-push-arm64
